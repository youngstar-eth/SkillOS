# ─────────────────────────────────────────────────────────────────────────
# Skillbase MAS — CI gate.
#
# Closes the honor-system gap CLAUDE.md identifies: every PR to main runs
# through typecheck + TS tests + Foundry tests + lint before a human
# reviewer can merge. Status check names below are referenced in the
# branch protection rules (applied via GitHub UI post-merge — see PR
# body for the checklist).
#
# Four jobs run in parallel to minimize feedback latency. Re-pushes to
# the same PR cancel any in-flight run via the concurrency block.
#
# Pinned to Node 20.x to match the package.json engines floor and the
# Vercel deploy runtime — CI mirrors prod.
#
# Security note: this workflow does NOT interpolate any user-controlled
# input (issue/PR titles/bodies, commit messages, branch names) into
# `run:` shells. Only GitHub-internal metadata (github.workflow,
# github.ref) is used, and only in the concurrency `group:` key — never
# in a shell context. See:
# https://github.blog/security/vulnerability-research/how-to-catch-github-actions-workflow-injections-before-attackers-do/
# ─────────────────────────────────────────────────────────────────────────

name: CI

on:
  pull_request:
    branches: [main]
  push:
    # Defense-in-depth: even after branch protection lands, main pushes
    # (e.g. squash-merges) re-validate the gate. Also primes the npm
    # cache so the next PR's first run is fast.
    branches: [main]

# Cancel any superseded run for the same ref. PR re-pushes won't pile up;
# main pushes never cancel an in-flight PR (different ref).
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Status check name: typecheck
  typecheck:
    name: typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Typecheck all workspaces (turbo-orchestrated)
        run: npm run typecheck

  # Status check name: test-ts
  test-ts:
    name: test-ts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Build @skillos/mcp (smoke-x32-4-stub.ts validates the ./engine/2048 subpath export via the package.json exports map — requires dist/)
        run: npm run build --workspace=@skillos/mcp
      - name: Run TS tests (node:test via tsx)
        # Direct invocation matches the local developer pattern — no
        # turbo `test` task defined. 37 test files: 11 in duel-backend
        # (incl. X23.2 cron-ratings, X20.1 F0 submit gate, X19 schema
        # integrity, X14.1 ext profile log), 2 in sp-engine, 2 in ui
        # (pure-helper tests, no RTL setup — duel-result-branch + X14.1
        # extension-whitelist), 3 in apps/api (X10 server-side dataSuffix
        # attribution, X23.3 rating endpoints, X15.5 Upstash rate-limit
        # wiring), 1 in packages/contracts (X10b canonical Builder Code
        # surface), 1 in packages/glicko-rating (X23.1 wrapper determinism),
        # 1 in packages/anti-cheat (X20.0b F0 plausibility formula),
        # 8 in packages/engines (Δ6: 2048 engine determinism + 6 per-game
        # golden harnesses incl. registry + the 2048 golden gate), 7 in
        # scripts/ (X32-4 stub smoke + 6 Δ6 live-vs-engine fidelity gates:
        # 2048/wordle/sudoku/minesweeper/clicker/match3).
        # No user-controlled input is interpolated below — only fixed
        # repo-relative paths.
        run: |
          npx tsx --test \
            packages/duel-backend/test/cron-settle.test.ts \
            packages/duel-backend/test/settle-guard.test.ts \
            packages/duel-backend/test/settle-guard.integration.test.ts \
            packages/duel-backend/test/reconcile.test.ts \
            packages/duel-backend/test/decide-winner.test.ts \
            packages/duel-backend/test/reconcile-duels.test.ts \
            packages/duel-backend/test/index-tournaments-created.test.ts \
            packages/duel-backend/test/tournaments.test.ts \
            packages/duel-backend/test/cron-ratings.test.ts \
            packages/duel-backend/test/x20-1-f0-submit-gate.test.ts \
            packages/duel-backend/test/x19-schema-integrity.test.ts \
            packages/duel-backend/test/x14-1-extension-profile-log.test.ts \
            packages/ui/test/duel-result-branch.test.ts \
            packages/ui/test/extension-whitelist.test.ts \
            packages/sp-engine/src/engine.test.ts \
            packages/sp-engine/src/anchor.test.ts \
            packages/contracts/test/builder-codes.test.ts \
            packages/glicko-rating/test/update.test.ts \
            packages/anti-cheat/test/formula.test.ts \
            packages/engines/src/games/__tests__/game2048.test.ts \
            packages/engines/src/__tests__/golden.test.ts \
            packages/engines/src/__tests__/wordle.golden.test.ts \
            packages/engines/src/__tests__/sudoku.golden.test.ts \
            packages/engines/src/__tests__/minesweeper.golden.test.ts \
            packages/engines/src/__tests__/clicker.golden.test.ts \
            packages/engines/src/__tests__/match3.golden.test.ts \
            packages/engines/src/__tests__/registry.test.ts \
            apps/api/test/games.test.ts \
            apps/api/test/ratings.test.ts \
            apps/api/test/rate-limit.test.ts \
            scripts/smoke-x32-4-stub.ts \
            scripts/fidelity-2048-live-vs-engine.test.ts \
            scripts/fidelity-wordle-live-vs-engine.test.ts \
            scripts/fidelity-sudoku-live-vs-engine.test.ts \
            scripts/fidelity-minesweeper-live-vs-engine.test.ts \
            scripts/fidelity-clicker-live-vs-engine.test.ts \
            scripts/fidelity-match3-live-vs-engine.test.ts


  # Status check name: test-foundry
  test-foundry:
    name: test-foundry
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        # Vendored libs (forge-std, openzeppelin-contracts) are committed
        # under contracts/lib/ — no submodules to fetch.
      - uses: foundry-rs/foundry-toolchain@v1
        with:
          version: stable
      - name: Run Foundry tests
        working-directory: contracts
        run: forge test -vvv

  # Status check name: lint
  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Lint all apps (turbo-orchestrated)
        # `npm run lint` runs `next lint` per app (8 apps). Packages do
        # not declare a lint task; turbo skips them. next lint exits 0
        # on warnings, non-zero on errors — the gate enforces error-free
        # but doesn't block on warnings (matches Vercel build behavior).
        run: npm run lint
